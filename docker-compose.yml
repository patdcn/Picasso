# Picasso portal — single web service with a persistent volume for auth.db (and,
# later, tool data files under /data/tools/...).
#
# Environment variables to set in the Dokploy UI (NOT committed here):
#   SECRET_KEY       long random string used to sign session cookies
#   ADMIN_EMAIL      bootstrap admin email (created on first run)
#   ADMIN_PASSWORD   bootstrap admin password (used once on first run)
#   COOKIE_SECURE    "true" once HTTPS/Let's Encrypt is live; "false" until then
#
# Optional (enables emailing access requests to admins; leave unset to disable):
#   SMTP_HOST, SMTP_PORT, SMTP_USER, SMTP_PASSWORD, SMTP_FROM, SMTP_USE_TLS
#
# The worker/redis/postgres services get added here later if/when needed.
services:
  web:
    build: .
    restart: unless-stopped
    ports:
      - "8050:8050"
    environment:
      - AUTH_DB=/data/auth.db
      - PARAM_DB=/data/parameter.db
      - SECRET_KEY=${SECRET_KEY}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - COOKIE_SECURE=${COOKIE_SECURE}
      # Optional SMTP for access-request notifications (safe to leave blank):
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM=${SMTP_FROM:-}
      - SMTP_USE_TLS=${SMTP_USE_TLS:-true}
    volumes:
      - picasso_data:/data        # persists auth.db + parameter.db across redeploys
    # In Dokploy: attach the domain to this service, container port 8050, HTTPS on.

volumes:
  picasso_data:
